<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密碼 - MiniClinic</title>
    <link rel="stylesheet" href="/css/style.css"> <!-- 假設有一個全域的 CSS 檔案 -->
</head>
<body>
    <div class="container">
        <h1>修改密碼</h1>
        <p th:if="${loggedInDoctorName}">您好，<span th:text="${loggedInDoctorName}">醫師姓名</span></p>

        <!-- 錯誤訊息顯示區塊 -->
        <div th:if="${errorMessage}" class="error-message">
            <p th:text="${errorMessage}"></p>
        </div>
        <div th:if="${#fields.hasErrors('passwordForm.*')}" class="error-message">
            <p th:each="err : ${#fields.errors('passwordForm.*')}" th:text="${err}"></p>
        </div>

        <form th:action="@{/password}" th:object="${passwordForm}" method="post">
            <div>
                <label for="oldPassword">舊密碼:</label>
                <input type="password" id="oldPassword" th:field="*{oldPassword}" required>
            </div>
            <div>
                <label for="newPassword">新密碼:</label>
                <input type="password" id="newPassword" th:field="*{newPassword}" required>
            </div>
            <div>
                <label for="confirmNewPassword">確認新密碼:</label>
                <input type="password" id="confirmNewPassword" th:field="*{confirmNewPassword}" required>
            </div>
            <div>
                <button type="submit">修改密碼</button>
            </div>
        </form>
        <p><a th:href="@{/dashboard}">返回儀表板</a></p>
    </div>
</body>
</html>
