<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>統計資訊 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #5EEAD4; }
        .stats-card { background: #F8FAFC; padding: 20px; border-left: 5px solid #14B8A6; margin-bottom: 20px; }
        /* Add styles for logout button in nav if needed */
        nav form button {
            background: none; border: none; color: white; cursor: pointer; font-weight: bold; margin-left: 20px;
        }
        nav form button:hover { color: #5EEAD4; }
        .stats-card h2 { color: #0F2443; margin-top: 0; }
        .stats-card p { margin: 8px 0; }
        .stats-card strong { color: #14B8A6; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #0F2443; color: white; }
        tr:hover { background: #F8FAFC; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/patients}">病歷資料</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">統計資訊</a>
        <a th:href="@{/dashboard}">我的儀表板</a>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit">登出</button>
        </form>
    </nav>

    <h1>統計資訊</h1>

    <div class="stats-card">
        <h2>總覽</h2>
        <p>醫師總數：<strong><span th:text="${doctorCount}">0</span></strong> 位</p>
        <p>病患總數：<strong><span th:text="${patientCount}">0</span></strong> 位</p>
        <p>掛號總數：<strong><span th:text="${appointmentCount}">0</span></strong> 筆</p>
    </div>

    <div class="stats-card">
        <h2>依科別掛號數</h2>
        <table th:if="${not #lists.isEmpty(appointmentsByDepartment)}">
            <thead>
                <tr>
                    <th>科別</th>
                    <th>掛號數</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${appointmentsByDepartment}">
                    <td th:text="${entry.key}">家醫科</td>
                    <td th:text="${entry.value}">0</td>
                </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(appointmentsByDepartment)}">目前沒有掛號記錄。</p>
    </div>

    <p style="margin-top: 20px;">
        <a th:href="@{/}">← 回首頁</a>
    </p>
</body>
</html>
